<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="color-scheme" content="dark" />

  <title>PixelTriks:Wreckyard</title>
  <meta name="description" content="Co-op PvE Survival Derby. Smash the AI horde or be overwhelmed. Built for Vibe Jam 2026." />

  <meta property="og:title"       content="PixelTriks:Wreckyard" />
  <meta property="og:description" content="Co-op PvE Survival Derby. Smash the AI horde. Vibe Jam 2026." />
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="PixelTriks:Wreckyard" />
  <meta name="twitter:card"       content="summary_large_image" />

  <!-- Favicon: orange crash icon -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2308000e'/%3E%3Ctext x='16' y='23' font-size='22' text-anchor='middle' fill='%23ff4400'%3E%F0%9F%92%A5%3C/text%3E%3C/svg%3E" />

  <!-- VIBE JAM 2026 WIDGET — REQUIRED BY RULE #02. DO NOT REMOVE. -->
  <script async src="https://vibej.am/2026/widget.js"></script>
  <link rel="preconnect" href="https://vibej.am" crossorigin />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #1a1a2e;
      color: #e2e8f0;
      font-family: ui-monospace, 'SF Mono', Monaco, 'Cascadia Code', monospace;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      overscroll-behavior: none;
      user-select: none;
    }

    #app   { position: fixed; inset: 0; }
    #app > canvas { display: block; width: 100% !important; height: 100% !important; }

    /* ── Flash overlay (crash effects) ── */
    #flash-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 8;
      background: #ffffff; opacity: 0;
      transition: opacity 0.12s ease-out;
      mix-blend-mode: screen;
    }

    /* ── Error box ── */
    #error-box {
      position: fixed; inset: 0; display: none; place-items: center;
      background: rgba(255, 255, 255, 0.9); z-index: 20; padding: 20px;
    }
    #error-box.show { display: grid; }
    #error-box pre {
      color: #ff3d5a; font-size: 12px; max-width: 600px;
      white-space: pre-wrap; word-break: break-word;
    }

    /* Move Vibe Jam widget from bottom-right to top-center */
    body > a[href*="vibej"][style*="fixed"] {
      bottom: auto !important;
      right: auto !important;
      top: 8px !important;
      left: 50% !important;
      transform: translateX(-50%) !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="flash-overlay"></div>

  <div id="error-box">
    <pre id="error-message"></pre>
  </div>

  <script>
    new MutationObserver((_, obs) => {
      const w = document.querySelector('a[href*="vibej"]')
      if (!w) return
      obs.disconnect()
      w.style.cssText += ';bottom:auto!important;right:auto!important;top:8px!important;left:50%!important;transform:translateX(-50%)!important;'
    }).observe(document.body, { childList: true })
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
